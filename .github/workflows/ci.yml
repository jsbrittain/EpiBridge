name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -e ".[dev]"

    - name: Run unit tests
      run: |
        cd backend
        python -m pytest tests/unit -v --cov=app --cov-report=term-missing

    - name: Validate Docker Compose
      run: docker compose config

    - name: Build backend
      run: docker build -t epibridge-backend backend/

    - name: Build frontend
      run: docker build -t epibridge-frontend frontend/
